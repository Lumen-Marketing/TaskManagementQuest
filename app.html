<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Quest HQ — Task Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Mono:wght@400;500;600&family=IBM+Plex+Sans+Condensed:wght@500;600;700&family=IBM+Plex+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/[email protected]/dist/tabler-icons.min.css">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="taskmanagement.css">
<script>
  // Apply persisted theme before first paint to avoid flash.
  (function () {
    try {
      var t = localStorage.getItem('questhq:theme');
      if (t === 'light' || t === 'dark') document.documentElement.setAttribute('data-theme', t);
      else document.documentElement.setAttribute('data-theme', 'dark');
    } catch (e) {
      document.documentElement.setAttribute('data-theme', 'dark');
    }
  })();
</script>
</head>
<body>
<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <div class="logo"><i class="ti ti-bolt"></i></div>
      <div>
        <div class="brand-name">Quest HQ</div>
        <div class="brand-sub">Roofing · Drafting · Lumen</div>
      </div>
    </div>
    <div class="topbar-right">
      <div class="search">
        <i class="ti ti-search"></i>
        <input type="text" id="searchInput" placeholder="Search tasks, people, projects" />
      </div>

      <!-- Clock-in / Clock-out widget -->
      <div id="clockWidget" class="clock-widget" title="Clock in / out">
        <i class="ti ti-player-play-filled"></i>
        <span id="clockLabel">Clock in</span>
        <span id="clockTimer" class="clock-timer hidden">00:00:00</span>
      </div>

      <div style="position: relative;">
        <button class="icon-btn" id="notifBtn" aria-label="Notifications">
          <i class="ti ti-bell"></i>
          <span class="dot hidden" id="notifDot"></span>
        </button>
        <div id="notifPanel" class="notif-panel hidden">
          <div class="notif-head">
            <div class="notif-head-title">Inbox</div>
            <button class="btn-sm" id="markAllRead" style="font-size: 11px; color: var(--ink-3);">Mark all read</button>
          </div>
          <div class="notif-list" id="notifList"></div>
        </div>
      </div>
      <div class="avatar" id="userAvatar" title="Sign out" style="background: var(--amber); color: var(--color-accent-ink);">AM</div>
      <button class="icon-btn" id="signOutBtn" title="Sign out" aria-label="Sign out"><i class="ti ti-logout"></i></button>
    </div>
  </div>

  <!-- COMMAND DECK (replaces the left sidebar) -->
  <nav class="deck">
    <div class="sidebar">

      <!-- primary: view segments + actions -->
      <div class="deck-primary">
        <div class="side-group grp-views">
          <div class="side-label">Views</div>
          <div class="side-item active" data-view="all"><i class="ti ti-list-check"></i>All <span class="side-count" id="cnt-all">0</span></div>
          <div class="side-item" data-view="mine"><i class="ti ti-user"></i>Mine <span class="side-count" id="cnt-mine">0</span></div>
          <div class="side-item" data-view="hot"><i class="ti ti-bolt" style="color: var(--u-urgent);"></i>Urgent <span class="side-count" id="cnt-hot" style="color: var(--u-urgent);">0</span></div>
          <div class="side-item" data-view="today"><i class="ti ti-flame" style="color: var(--rust);"></i>Today <span class="side-count danger-text" id="cnt-today">0</span></div>
          <div class="side-item" data-view="overdue"><i class="ti ti-alert-triangle"></i>Overdue <span class="side-count" id="cnt-overdue">0</span></div>
          <div class="side-item" data-view="watching"><i class="ti ti-eye"></i>Watching <span class="side-count" id="cnt-watching">0</span></div>
        </div>

        <div class="deck-actions">
          <div class="layout-switcher" id="layoutSwitcher">
            <button class="layout-btn active" data-layout="table" title="Table"><i class="ti ti-table"></i></button>
            <button class="layout-btn" data-layout="timeline" title="Timeline"><i class="ti ti-timeline"></i></button>
            <button class="layout-btn" data-layout="kanban" title="Kanban"><i class="ti ti-layout-kanban"></i></button>
          </div>
          <button class="btn" id="filterBtn"><i class="ti ti-filter"></i>Filter</button>
          <button class="btn btn-primary" id="newTaskBtn"><i class="ti ti-plus"></i>New task</button>
        </div>
      </div>

      <!-- secondary: a single "More views" menu + role-gated chips -->
      <div class="deck-scope">
        <button class="btn btn-sm" id="moreViewsBtn">
          <i class="ti ti-layout-grid"></i>More views<i class="ti ti-chevron-down chevron"></i>
        </button>

        <div class="side-group" id="teamSideGroup">
          <div class="side-label">Org</div>
          <div class="side-item" data-view="team:hierarchy"><i class="ti ti-sitemap"></i>Team chart</div>
        </div>

        <div class="side-group" id="adminSideGroup">
          <div class="side-label">Admin</div>
          <div class="side-item" data-view="approvals"><i class="ti ti-user-check"></i>Approvals</div>
          <div class="side-item" data-view="admin:clock"><i class="ti ti-stopwatch"></i>Clock <span class="side-count" id="cnt-clock-live">0</span></div>
        </div>
      </div>

    </div>
  </nav>

  <!-- WORK SURFACE (full-bleed) -->
  <main class="main" id="mainPane">
    <div class="list-pane" id="listPane">

      <div class="page-head">
        <div class="page-title-block">
          <div class="page-eyebrow" id="pageEyebrow">This week</div>
          <h1 class="page-title" id="pageTitle">All tasks</h1>
        </div>
      </div>

      <div id="taskViewWrap">
        <div class="list-header">
          <span></span>
          <span>Task</span>
          <span>Type</span>
          <span>Company</span>
          <span>Assignee</span>
          <span>Urgency</span>
          <span>Due</span>
          <span>Status</span>
          <span></span>
        </div>

        <div id="listBody"></div>
      </div>

      <!-- Time-tracking views render into this container -->
      <div id="timeViewWrap" class="hidden"></div>
    </div>

    <!-- Detail panel (toggled) -->
    <aside class="detail hidden" id="detailPane"></aside>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<!-- ============ MVC SCRIPT LOAD ORDER ============
     Foundation → Models → Views → Controllers → Bootstrap.
     Each file attaches to the global `App` namespace. -->

<!-- Supabase SDK + auth guard (must run before app bootstrap) -->
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="js/EventBus.js"></script>
<script src="js/config.js"></script>
<script src="js/auth-guard.js"></script>

<!-- Foundation -->
<script src="js/constants.js"></script>
<script src="js/utils.js"></script>

<!-- Models -->
<script src="js/models/TaskModel.js"></script>
<script src="js/models/TimeModel.js"></script>
<script src="js/models/NotificationModel.js"></script>
<script src="js/services/SupabaseDataStore.js"></script>

<!-- Views -->
<script src="js/views/ToastView.js"></script>
<script src="js/views/TopbarView.js"></script>
<script src="js/views/SidebarView.js"></script>
<script src="js/views/TaskListView.js"></script>
<script src="js/views/TaskDetailView.js"></script>
<script src="js/views/TimeView.js"></script>
<script src="js/views/ApprovalView.js"></script>
<script src="js/views/ClockDashboardView.js"></script>
<script src="js/views/HierarchyView.js"></script>
<script src="js/views/TourView.js"></script>
<script src="js/views/NewTaskModalView.js"></script>

<!-- Controllers -->
<script src="js/controllers/AppController.js"></script>

<!-- Bootstrap -->
<script src="js/app.js"></script>
</body>
</html>
