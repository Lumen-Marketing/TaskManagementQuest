<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
<title>Quest HQ — Task Manager</title>
<link rel="icon" href="/favicon.svg" type="image/svg+xml">
<link rel="manifest" href="/manifest.webmanifest">
<meta name="theme-color" content="#FBFAF8">
<link rel="apple-touch-icon" href="/icons/apple-touch-icon.png">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Quest HQ">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Hanken+Grotesk:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="vendor/tabler-icons/tabler-icons-subset.css">
<link rel="stylesheet" href="tokens.css">
<link rel="stylesheet" href="taskmanagement.css">
<link rel="stylesheet" href="css/taskdetail.css">
<link rel="stylesheet" href="css/newtask.css">
<link rel="stylesheet" href="css/tasks.css">
<link rel="stylesheet" href="css/mobile.css">
<script src="js/theme-boot.js"></script>
</head>
<body class="ui-command-center">
<!-- Boot loading screen (FaultyTerminal port). The static brand frame below paints
     at first paint (pure CSS); LoaderView.js (deferred, like every script except
     theme-boot) swaps in the animated WebGL terminal post-parse, and app.js fades
     the whole thing out once data has loaded. No external dependency — LoaderView
     falls back to a static wash when WebGL is unavailable. -->
<div id="appLoader" aria-hidden="true">
  <!-- Static first frame: identical to LoaderView's brand block so the loader
       is visible from first paint, before ANY script runs. LoaderView.build()
       replaces this wholesale with the animated terminal version once the deferred
       scripts execute. -->
  <section class="ldr-intro">
    <div class="ldr-brand">
      <div class="ldr-logo"><i class="ti ti-bolt"></i></div>
      <div class="ldr-name">Quest HQ</div>
      <div class="ldr-dots"><span></span><span></span><span></span></div>
    </div>
  </section>
</div>
<script defer src="js/views/LoaderView.js"></script>

<!-- Accessibility: lets keyboard / screen-reader users jump straight past the
     top bar and sidebar into the task list. Visually hidden until focused. -->
<a href="#mainPane" class="skip-link">Skip to main content</a>

<!-- Network resilience: a persistent, clearly-worded banner shown by
     ConnectionView whenever the browser goes offline. -->
<div id="offlineBanner" class="offline-banner hidden" role="status">
  <i class="ti ti-wifi-off" aria-hidden="true"></i>
  You're offline — your changes are kept and will sync automatically when the connection returns.
</div>

<div class="app">

  <!-- TOP BAR -->
  <div class="topbar">
    <div class="topbar-left">
      <!-- Brand mark doubles as the mobile nav-drawer toggle (SidebarView). -->
      <button class="tb-logo logo" id="brandLogo" aria-label="Toggle navigation"><i class="ti ti-bolt"></i></button>
      <!-- Primary section nav (Home · Tasks · Projects · Team ▾ · Reports),
           painted + role-gated by TopbarView.renderPrimaryNav. -->
      <nav class="primary-nav" id="primaryNav" aria-label="Primary"></nav>
    </div>
    <div class="topbar-right">
      <div class="search">
        <i class="ti ti-search" aria-hidden="true"></i>
        <input type="text" id="searchInput" aria-label="Search tasks, people, projects" placeholder="Search tasks, people, projects" />
      </div>

      <!-- Workspace / company switcher. Painted by TopbarView.renderCompanySwitcher;
           shown only when >1 workspace. -->
      <div id="companySwitcher" class="company-switcher hidden"></div>

      <!-- Clock in / out (moved from the sidebar footer). -->
      <button type="button" id="clockWidget" class="clock-widget" aria-label="Clock in / out" title="Clock in / out">
        <i class="ti ti-player-play-filled" aria-hidden="true"></i>
        <span id="clockLabel">Clock in</span>
        <span id="clockTimer" class="clock-timer hidden">00:00:00</span>
      </button>

      <!-- Wallboard sits with the notification bell on the right. My time moved
           into the account menu; the task quick-filters live under "Tasks ▾". -->
      <div class="tb-views" id="tbViews" aria-label="Quick views">
        <button type="button" class="tb-icon" data-view="wallboard" title="Wallboard" aria-label="Wallboard"><i class="ti ti-device-tv"></i></button>
      </div>

      <button type="button" class="icon-btn" id="chatBtn" aria-label="Ask your tasks" title="Ask your tasks">
        <i class="ti ti-sparkles"></i>
      </button>

      <div style="position: relative;">
        <button class="icon-btn" id="notifBtn" aria-label="Notifications">
          <i class="ti ti-bell"></i>
          <span class="dot hidden" id="notifDot"></span>
        </button>
        <div id="notifPanel" class="notif-panel hidden">
          <div class="notif-head">
            <div class="notif-head-title">Inbox</div>
            <button class="btn-sm" id="markAllRead" style="font-size: 11px; color: var(--ink-3);">Mark all read</button>
          </div>
          <div class="notif-list" id="notifList"></div>
        </div>
      </div>

      <!-- Account chip (avatar + name). The chip opens the account menu, which
           also holds Display size + the developer "View as" switcher. -->
      <div class="userchip" id="userChip">
        <button type="button" class="avatar" id="userAvatar" aria-label="Account menu" aria-haspopup="menu" aria-expanded="false" style="background: var(--amber); color: var(--color-accent-ink);">AM</button>
        <div class="uc-meta">
          <div class="uc-name">Abraham M.</div>
          <div class="uc-role">Owner · Admin</div>
        </div>
        <i class="ti ti-chevron-down uc-gear" aria-hidden="true"></i>
      </div>
    </div>
  </div>

  <!-- MOBILE NAV DRAWER — the desktop layout has no sidebar; on phones this
       slide-in holds the full navigation (SidebarView.renderMobileNav). Hidden
       on desktop via CSS. -->
  <nav class="deck drawer" aria-label="Navigation">
    <div class="sidebar">
      <div class="side-scroll">
        <div id="railMobileNav" class="rail-mobile-nav"></div>
      </div>
    </div>
  </nav>

  <!-- WORK SURFACE -->
  <main class="main" id="mainPane" tabindex="-1" aria-label="Tasks">
    <div class="list-pane" id="listPane">

      <!-- The old work-toolbar row is gone: its View / overflow / create actions
           now live inside the header card (see .head-card-actions below), and
           Filter / Sort / Group by live in the Controls widget (#controlsWidget).
           The secondary buttons (Views/Select/Clear done/Export) stay in the DOM
           but hidden, reached through the "⋯ More" menu (ToolbarMenuView). -->
      <div class="page-head">
        <!-- Slim header card: the section name + the scope toggle. Replaces the
             plain "This week / All tasks" heading. (#pageEyebrow is kept hidden
             so TaskListView can still write to it without breaking.) -->
        <div class="head-card">
          <span class="page-eyebrow" id="pageEyebrow" hidden>This week</span>
          <h1 class="page-title head-card-title" id="pageTitle">All tasks</h1>
          <div class="seg" id="scopeSeg" role="tablist" aria-label="Task scope">
            <button type="button" data-scope="mine" title="My work"><i class="ti ti-user"></i><span class="seg-label">My work</span></button>
            <button type="button" data-scope="all" title="Company"><i class="ti ti-users-group"></i><span class="seg-label">Company</span></button>
          </div>
          <!-- View / overflow / create actions, moved here from the work-toolbar.
               Same IDs, so ToolbarMenuView + TaskListView handlers stay wired. -->
          <div class="head-card-actions">
            <button class="btn" id="viewBtn"><i class="ti ti-table"></i>View: Table</button>
            <button class="btn tb-secondary" id="viewsBtn"><i class="ti ti-bookmarks"></i>Views</button>
            <button class="btn tb-secondary" id="selectBtn"><i class="ti ti-checkbox"></i>Select</button>
            <button class="btn tb-secondary" id="clearDoneBtn" title="Clear done tasks (deleted in 30 days)" hidden><i class="ti ti-eraser"></i>Clear done</button>
            <button class="btn tb-secondary" id="exportBtn"><i class="ti ti-download"></i>Export</button>
            <button class="btn btn-more" id="moreBtn" aria-label="More actions" title="More"><i class="ti ti-dots"></i></button>
            <button class="btn btn-primary" id="newTaskBtn"><i class="ti ti-plus"></i>New task</button>
          </div>
        </div>
        <div class="page-head-widgets">
          <div class="up-next-mount" id="upNextWidget"></div>
          <div class="focus-widget-mount" id="focusWidget"></div>
          <div class="progress-widget-mount" id="progressWidget"></div>
          <!-- Controls widget — the Filter/Sort/Group by buttons relocated from
               the work-toolbar. Same button nodes/IDs, so handlers stay wired. -->
          <div class="controls-widget-mount" id="controlsWidget">
            <div class="controls-card">
              <button class="btn" id="filterBtn"><i class="ti ti-filter"></i>Filter</button>
              <button class="btn" id="sortBtn"><i class="ti ti-arrows-sort"></i>Sort</button>
              <button class="btn" id="groupBtn"><i class="ti ti-layout-rows"></i>Group by</button>
            </div>
          </div>
        </div>
      </div>

      <div id="filterBar" class="filter-bar hidden"></div>

      <div id="taskViewWrap">
        <div class="list-header">
          <span></span>
          <span>Task</span>
          <button type="button" class="col-filter" data-filter-col="statuses" aria-haspopup="listbox" aria-expanded="false">Status <i class="ti ti-chevron-down"></i></button>
          <button type="button" class="col-filter" data-filter-col="priorities" aria-haspopup="listbox" aria-expanded="false">Priority <i class="ti ti-chevron-down"></i></button>
          <button type="button" class="col-filter" data-filter-col="types" aria-haspopup="listbox" aria-expanded="false">Type <i class="ti ti-chevron-down"></i></button>
          <button type="button" class="col-filter" data-filter-col="companies" aria-haspopup="listbox" aria-expanded="false">Label <i class="ti ti-chevron-down"></i></button>
          <button type="button" class="col-filter" data-filter-col="assignees" aria-haspopup="listbox" aria-expanded="false">Assignee <i class="ti ti-chevron-down"></i></button>
          <button type="button" class="col-filter" data-filter-col="due" aria-haspopup="listbox" aria-expanded="false">Due <i class="ti ti-chevron-down"></i></button>
          <span></span>
        </div>

        <div id="listBody">
          <!-- Skeleton placeholder shown while the app boots + loads tasks from
               Supabase. Cleared automatically when the real list first renders
               (TaskListView wipes #listBody), or removed defensively in app.js. -->
          <div id="listSkeleton" class="skeleton-list" aria-hidden="true">
            <div class="skeleton-row"><span class="sk sk-check"></span><span class="sk sk-title"></span><span class="sk sk-pill"></span><span class="sk sk-avatar"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-date"></span></div>
            <div class="skeleton-row"><span class="sk sk-check"></span><span class="sk sk-title"></span><span class="sk sk-pill"></span><span class="sk sk-avatar"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-date"></span></div>
            <div class="skeleton-row"><span class="sk sk-check"></span><span class="sk sk-title"></span><span class="sk sk-pill"></span><span class="sk sk-avatar"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-date"></span></div>
            <div class="skeleton-row"><span class="sk sk-check"></span><span class="sk sk-title"></span><span class="sk sk-pill"></span><span class="sk sk-avatar"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-date"></span></div>
            <div class="skeleton-row"><span class="sk sk-check"></span><span class="sk sk-title"></span><span class="sk sk-pill"></span><span class="sk sk-avatar"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-date"></span></div>
            <div class="skeleton-row"><span class="sk sk-check"></span><span class="sk sk-title"></span><span class="sk sk-pill"></span><span class="sk sk-avatar"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-pill sk-pill-sm"></span><span class="sk sk-date"></span></div>
          </div>
        </div>
      </div>

      <!-- Time-tracking views render into this container -->
      <div id="timeViewWrap" class="hidden"></div>
    </div>

    <!-- Full-page redesigned surfaces (HomeView / ReportsView render into these) -->
    <section id="homeWrap" class="qhq-page hidden" aria-label="Home"></section>
    <section id="reportsWrap" class="qhq-page hidden" aria-label="Reports"></section>
    <section id="projectsWrap" class="qhq-page hidden" aria-label="Projects"></section>
    <section id="wallboardWrap" class="qhq-page hidden" aria-label="Wallboard"></section>

    <!-- Full-page task detail. Clicking a task row relocates #detailPane into
         this surface (instead of a centered modal) so the details read as their
         own page, with the topbar + sidebar kept in place — like Home/Reports. -->
    <section id="taskDetailWrap" class="qhq-page detail-page hidden" aria-label="Task details"></section>

    <!-- Full-page New task form. Replaces the old centered modal; rendered by
         NewTaskPageView and driven by controller.uiState.creatingTask. -->
    <section id="newTaskWrap" class="qhq-page detail-page hidden" aria-label="New task"></section>

    <!-- Drag-resize handle (only visible when the detail pane is open) -->
    <div class="resize-handle hidden" id="resizeHandle" aria-hidden="true"></div>

    <!-- Detail panel (toggled) -->
    <aside class="detail hidden" id="detailPane" aria-label="Task details"></aside>
  </main>
</div>

<!-- Floating quick-add button — legacy. Retired on phones (≤720px) in favour of
     the bottom-nav center ⊕; still present for any non-phone edge use. -->
<button type="button" id="fab" class="fab hidden" aria-label="New task" title="New task">
  <i class="ti ti-plus"></i>
</button>

<!-- Phone-only bottom tab bar (Instagram-style): Home · Tasks · ⊕ · Projects ·
     Profile. Painted + wired by BottomNavView; CSS-hidden above 720px. The
     center ⊕ is the only New-Task entry point on phones. -->
<nav id="bottomNav" aria-label="Primary (mobile)"></nav>

<!-- Bulk-select action bar (BulkActionsView mounts here). Fixed to the bottom,
     shown only while bulk-select mode is on. -->
<div id="bulkBar" class="bulk-bar hidden" role="toolbar" aria-label="Bulk actions"></div>

<!-- aria-live so screen readers announce toasts (saves, errors, offline) as
     they appear without the user having to find them. -->
<div class="toast-container" id="toastContainer" role="status" aria-live="polite" aria-atomic="false"></div>

<!-- ============ MVC SCRIPT LOAD ORDER ============
     Foundation → Models → Views → Controllers → Bootstrap.
     Each file attaches to the global `App` namespace. -->

<script defer src="js/EventBus.js"></script>
<script defer src="js/config.js"></script>

<script defer src="js/constants.js"></script>

<script defer src="js/utils.js"></script>
<script defer src="js/utils/motion.js"></script>

<script defer src="js/models/TaskModel.js"></script>

<script defer src="js/views/ToastView.js"></script>

</body>
</html>
